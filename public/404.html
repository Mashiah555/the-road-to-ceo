<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עמוד לא נמצא - הדרך למנכ"לות</title>
  <link rel="icon" href="assets/images/icon.png" type="image/png">

  <style>
    /* Fallback 404-specific styling */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f7f6;
      color: #333;
      text-align: center;
      transition: background-color 0.3s, color 0.3s;
    }

    .error-container {
      max-width: 500px;
      padding: 50px 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s, box-shadow 0.3s;
    }

    .error-code {
      font-size: 100px;
      font-weight: bold;
      margin: 0;
      color: #2b6cb0;
      /* Brand Pink */
      line-height: 1;
      text-shadow: 2px 2px 4px rgba(10, 20, 100, 0.1);
    }

    .error-title {
      font-size: 28px;
      margin-top: 15px;
      margin-bottom: 10px;
    }

    .error-message {
      font-size: 16px;
      color: #666;
      margin-bottom: 35px;
      line-height: 1.5;
    }

    .btn-home {
      display: inline-block;
      padding: 12px 30px;
      background-color: #2b6cb0;
      /* Brand Pink */
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 6px rgba(10, 20, 100, 0.1);
    }

    .btn-home:hover {
      background-color: #3182ce;
      /* Slightly darker pink for hover effect */
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(10, 20, 100, 0.1);
    }
  </style>
</head>

<body>
  <div class="error-container">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">אופס! נראה שהלכת לאיבוד...</h2>
    <p class="error-message">הדף שחיפשת לא נמצא.<br>אולי מישהו כבר עקף אותך בדרך למנכ"לות, או שהכתובת שגויה.</p>

    <a href="/" class="btn-home">חזרה לעמוד המשחק</a>
  </div>

</body>

</html>
